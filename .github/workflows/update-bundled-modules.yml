# ───────────────────────────────────────────────────────────────────────────────
# Update Bundled PowerShell Modules
# ───────────────────────────────────────────────────────────────────────────────
# Runs daily (and on manual dispatch) to check the PowerShell Gallery for newer
# versions of every module pinned in Build-BundledModules.ps1.  When an update
# is found the workflow:
#   1. Updates the pinned version in Build-BundledModules.ps1
#   2. Bumps the tool patch version in ArmClient-PS.ps1 and Build-BundledModules.ps1
#   3. Re-runs the build (regenerates Modules/, Versions.json, Files.sha256.json)
#   4. Commits and pushes the changes directly to the default branch
# ───────────────────────────────────────────────────────────────────────────────

name: Update Bundled Modules

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:   # Allow manual trigger from the Actions tab

permissions:
  contents: write      # Required to push commits

jobs:
  check-and-update:
    name: Check for module updates
    runs-on: windows-latest   # Windows required for Save-Module / Save-PSResource compatibility
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register PSGallery as trusted
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue
          if (Get-Command -Name Set-PSResourceRepository -ErrorAction SilentlyContinue) {
              Set-PSResourceRepository -Name PSGallery -Trusted -ErrorAction SilentlyContinue
          }

      - name: Check for updates and rebuild
        id: update
        shell: pwsh
        run: |
          & '.github/scripts/Update-BundledModules.ps1' -Verbose

      - name: Commit and push changes
        if: steps.update.outputs.has_updates == 'true'
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --all
          $summary = "${{ steps.update.outputs.commit_summary }}"
          $version = "${{ steps.update.outputs.new_tool_version }}"
          git commit -m "chore: update bundled modules ($summary) [v$version]"
          git push
